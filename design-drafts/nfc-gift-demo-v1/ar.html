<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Web AR 桌面生长术</title><link rel="stylesheet" href="shared.css"></head><body><video id="v" playsinline muted></video><canvas id="c"></canvas><main class="copy"><a class="back" href="./">返回总入口</a><span class="k">Web AR / 桌面生长术</span><h1>Web AR：点桌面，让爱心树长出来。</h1><p>这里补了真实 WebXR AR 入口：支持 immersive-ar 的浏览器会尝试进入 WebXR；iPhone Safari 和 HTTP 环境通常不支持，就自动走后置摄像头 + 点击放置的 WebAR 降级版。</p><div class="actions"><button id="xr">检测 WebXR AR</button><button id="camera">打开后置摄像头</button><button id="plant">放置爱心树</button></div></main><aside class="panel"><small>AR status</small><h2 id="arTitle">当前是可预览 WebAR 降级版</h2><p id="arStatus">公网 IP 是 HTTP，真实 WebXR immersive-ar 通常要求 HTTPS + 支持 ARCore/WebXR 的浏览器。NFC 最终上 GitHub Pages/HTTPS 后再测真实 AR。</p></aside><script src="shared.js"></script><script>giftAR();document.getElementById('xr').onclick=async()=>{const title=document.getElementById('arTitle'),st=document.getElementById('arStatus');if(!('xr' in navigator)){title.textContent='这个浏览器没有 WebXR';st.textContent='当前会使用摄像头点击放置降级版。iPhone Safari 对 WebXR AR 支持很有限。';return}try{const ok=await navigator.xr.isSessionSupported('immersive-ar');if(!ok){title.textContent='WebXR 存在，但不支持 immersive-ar';st.textContent='继续使用摄像头点击放置。后续如果用支持 WebXR AR 的 Android Chrome + HTTPS，可以进入真实 AR session。';return}title.textContent='支持 immersive-ar';st.textContent='浏览器支持真实 WebXR AR；下一步可接 Three.js hit-test 平面检测。'}catch(e){title.textContent='WebXR 检测被拦截';st.textContent='多半是 HTTP 或浏览器权限限制。当前页面已保留 WebAR 降级体验。'}};</script></body></html>
