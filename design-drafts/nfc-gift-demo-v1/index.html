<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>NFC 单功能审阅页</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#fff8f1;background:#120d10}canvas,video{position:fixed;inset:0;width:100%;height:100%;display:block;object-fit:cover}.veil{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(circle at 58% 42%,transparent 0 28rem,rgba(0,0,0,.38) 55rem,rgba(0,0,0,.78)),linear-gradient(180deg,rgba(255,255,255,.03),transparent 32%,rgba(0,0,0,.28))}.grain{position:fixed;inset:0;z-index:20;pointer-events:none;opacity:.12;background-image:linear-gradient(rgba(255,255,255,.22) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.12) 1px,transparent 1px);background-size:30px 30px;mix-blend-mode:soft-light}.top{position:fixed;z-index:8;left:50%;top:max(13px,env(safe-area-inset-top));transform:translateX(-50%);width:min(1080px,calc(100% - 24px));display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;border:1px solid rgba(255,255,255,.14);border-radius:28px;background:rgba(255,248,241,.09);backdrop-filter:blur(22px);box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 24px 80px rgba(0,0,0,.22);padding:9px}.brand{display:flex;align-items:center;gap:9px;padding:0 7px;white-space:nowrap}.mark{width:32px;height:32px;border-radius:50%;background:conic-gradient(from 160deg,#c75370,#ffe0e7,#e1bd6f,#c75370);box-shadow:inset 0 0 0 7px rgba(255,255,255,.22)}.brand b{font-size:14px;letter-spacing:.07em;text-transform:uppercase}.nav{display:flex;gap:6px;overflow:auto;scrollbar-width:none}.nav button{white-space:nowrap;border:1px solid transparent;border-radius:999px;background:rgba(255,255,255,.07);color:rgba(255,248,241,.72);padding:8px 12px}.nav button.active{background:rgba(255,248,241,.18);border-color:rgba(255,255,255,.15);color:#fff8f1}.copy{position:fixed;z-index:7;left:max(20px,5vw);bottom:max(22px,6vh);width:min(560px,calc(100% - 40px));transition:opacity .25s}.k{display:inline-flex;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);backdrop-filter:blur(16px);border-radius:999px;padding:8px 12px;color:#f6c1cc;font-size:13px}.copy h1{font-size:clamp(44px,9vw,88px);line-height:.88;letter-spacing:-.075em;margin:16px 0 13px;text-wrap:balance}.copy p{font-size:16px;line-height:1.75;color:rgba(255,248,241,.72);max-width:64ch}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}button{font:inherit;border:0;cursor:pointer}button.main,button.sub{border-radius:999px;padding:13px 16px;color:#fff}button.main{background:linear-gradient(135deg,#a83f5b,#e78ba0);box-shadow:0 18px 45px rgba(206,82,116,.25)}button.sub{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16)}.panel{position:fixed;z-index:6;right:max(16px,4vw);top:50%;transform:translateY(-50%);width:min(350px,calc(100% - 32px));border:1px solid rgba(255,255,255,.14);border-radius:30px;background:rgba(255,248,241,.09);backdrop-filter:blur(22px);padding:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 24px 80px rgba(0,0,0,.24)}.panel small{color:#f6c1cc;letter-spacing:.14em;text-transform:uppercase}.panel h2{font-size:24px;line-height:1.08;letter-spacing:-.04em;margin:10px 0}.panel p{font-size:14px;line-height:1.65;color:rgba(255,248,241,.72)}.card{position:fixed;z-index:5;left:50%;top:45%;transform:translate(-50%,-50%);width:min(330px,78vw);min-height:460px;border:1px solid rgba(255,255,255,.16);border-radius:34px;background:linear-gradient(145deg,rgba(255,248,241,.22),rgba(255,248,241,.07));backdrop-filter:blur(18px);box-shadow:0 34px 90px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.16);padding:24px;display:none}.card.show{display:grid;place-items:center;text-align:center}.card h3{font-size:34px;line-height:1.05;letter-spacing:-.05em;margin:12px 0}.card p{color:rgba(255,248,241,.72);line-height:1.7}@media(max-width:820px){.top{grid-template-columns:1fr;border-radius:24px}.panel{display:none}.copy{left:17px;right:17px;bottom:20px;width:auto}.copy h1{font-size:clamp(43px,15vw,70px)}.copy p{font-size:15px}.nav button{padding:7px 10px;font-size:13px}}
</style>
</head><body>
<video id="video" playsinline muted></video><canvas id="fx"></canvas><div class="veil"></div><div class="grain"></div>
<header class="top"><div class="brand"><span class="mark"></span><b>NFC Review</b></div><nav class="nav" id="nav"></nav></header>
<main class="copy"><span class="k" id="k">01 / Bloom</span><h1 id="title">碰一下，桌面开花。</h1><p id="desc">零权限主推：打开 0.5 秒内出现光点，随后长成一朵大花，最后停成一张可截图的画面。</p><div class="actions"><button class="main" id="primary">重新触发</button><button class="sub" id="secondary">下一种</button></div></main>
<aside class="panel"><small>review note</small><h2 id="noteTitle">单 NFC = 单功能入口</h2><p id="note">这里先合在一个审阅页里看效果，实际落地时每个 NFC 只写一个对应链接。</p></aside>
<section class="card" id="card"><div><span class="k">今日签</span><h3 id="quote">今天也要被温柔照顾。</h3><p>每天固定一句，打开就是一张小卡。</p></div></section>
<script>
const canvas=document.getElementById('fx'),ctx=canvas.getContext('2d'),video=document.getElementById('video');let W=0,H=0,D=1,mode='bloom',t0=performance.now(),particles=[],petals=[],fire=[],trail=[],flowers=[],audio=null,analyser=null,freq=null,theme=344;const modes={bloom:['01 / Bloom','碰一下，桌面开花。','零权限主推：打开 0.5 秒内出现光点，随后长成一朵大花，最后停成一张可截图的画面。','重新开花'],music:['02 / Music Box','碰一下，变成一只小唱机。','NFC 最像这个：碰一下打开，点一下播放，唱片旋转，封面和光晕跟着音乐动。','播放音乐盒'],quote:['03 / Daily Card','碰一下，抽一句今日签。','反复打开最有用：卡片从雾里翻出来，每天第一句固定，可做夸夸/想你/今日小任务。','抽一句'],firework:['04 / Firework','碰一下，烟花把字写出来。','纪念日专用：夜空先安静，再一束束烟花爆开，最后拼成一句短话。','重放烟花'],sprite:['05 / Desk Sprite','碰一下，桌上跳出一朵小花。','摄像头叠加版 WebAR：不硬做复杂平面检测，先做一个有生命感的小花/小精灵。','打开摄像头']};
const nav=document.getElementById('nav');Object.keys(modes).forEach(k=>{let b=document.createElement('button');b.textContent=modes[k][0].split('/')[1].trim();b.onclick=()=>setMode(k);nav.appendChild(b)});function fit(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*D;canvas.height=H*D;ctx.setTransform(D,0,0,D,0,0)}addEventListener('resize',fit);fit();function setMode(m){mode=m;t0=performance.now();particles=[];petals=[];fire=[];trail=[];flowers=[];document.getElementById('card').classList.toggle('show',m==='quote');document.querySelectorAll('.nav button').forEach((b,i)=>b.classList.toggle('active',Object.keys(modes)[i]===m));document.getElementById('k').textContent=modes[m][0];document.getElementById('title').textContent=modes[m][1];document.getElementById('desc').textContent=modes[m][2];document.getElementById('primary').textContent=modes[m][3];if(m==='bloom')seedBloom();if(m==='firework')seedFire();if(m==='quote')pickQuote();if(m==='music')seedMusic();if(m==='sprite')seedSprite()}function bg(h=344){let g=ctx.createRadialGradient(W*.55,H*.42,10,W*.55,H*.45,Math.max(W,H)*.72);g.addColorStop(0,`hsla(${h},58%,30%,.62)`);g.addColorStop(.45,'rgba(42,24,32,.78)');g.addColorStop(1,'rgba(13,9,12,1)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H)}function glow(x,y,r,c){let g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,c);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill()}function heart(a,s,cx,cy){return{x:cx+16*Math.sin(a)**3*s,y:cy-(13*Math.cos(a)-5*Math.cos(2*a)-2*Math.cos(3*a)-Math.cos(4*a))*s}}
function seedBloom(){let cx=W*.55,cy=H*.55;for(let i=0;i<900;i++){let a=Math.random()*7,r=Math.random()*Math.min(W,H)*.48;particles.push({x:cx,y:cy,vx:Math.cos(a)*r*.018,vy:Math.sin(a)*r*.018,tx:cx+Math.cos(a)*r,ty:cy+Math.sin(a)*r*.72,life:1,seed:Math.random()*7})}for(let i=0;i<220;i++)petals.push({x:Math.random()*W,y:-Math.random()*H*.3,vx:(Math.random()-.5)*1.2,vy:Math.random()*1.5+.8,r:Math.random()*7+5,a:.35+Math.random()*.45,rot:Math.random()*7})}
function drawBloom(now){let age=(now-t0)/1000,cx=W*.55,cy=H*.58;bg(344);ctx.globalCompositeOperation='lighter';for(let i=0;i<44;i++){let a=-1.57+(i-22)*.065,len=Math.min(W,H)*(.22+.14*Math.sin(i))*(1-Math.exp(-age*1.8));ctx.strokeStyle=i%3?'rgba(232,196,122,.68)':'rgba(255,154,184,.62)';ctx.lineWidth=2.2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.bezierCurveTo(cx+Math.cos(a)*len*.25,cy-len*.38,cx+Math.sin(i)*Math.min(W,H)*.08,cy-len*.74,cx+Math.cos(a)*len,cy-len);ctx.stroke()}particles.forEach(p=>{p.x+=(p.tx-p.x)*.018;p.y+=(p.ty-p.y)*.018;p.life*=.997;ctx.fillStyle=`hsla(${344+(p.seed>3.5?42:0)},80%,70%,${p.life*.55})`;ctx.beginPath();ctx.arc(p.x+Math.sin(now/500+p.seed)*4,p.y+Math.cos(now/700+p.seed)*4,2.2,0,7);ctx.fill()});petals.forEach(p=>{p.x+=p.vx+Math.sin(now/700+p.rot)*.4;p.y+=p.vy;p.rot+=.02;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=`rgba(255,154,184,${p.a})`;ctx.beginPath();ctx.ellipse(0,0,p.r*.7,p.r,0,0,7);ctx.fill();ctx.restore()});glow(cx,cy-Math.min(W,H)*.22,Math.min(W,H)*.28,'rgba(255,160,190,.16)');ctx.globalCompositeOperation='source-over'}
function seedMusic(){for(let i=0;i<160;i++)particles.push({a:i/160*7,r:Math.random()*Math.min(W,H)*.36+40,seed:Math.random()*7})}async function startMusic(){try{if(!audio){audio=new(window.AudioContext||window.webkitAudioContext)();let osc=audio.createOscillator(),gain=audio.createGain();analyser=audio.createAnalyser();analyser.fftSize=128;freq=new Uint8Array(analyser.frequencyBinCount);osc.type='sine';osc.frequency.value=261.63;gain.gain.value=.035;osc.connect(gain);gain.connect(analyser);analyser.connect(audio.destination);osc.start();window._osc=osc}if(audio.state==='suspended')await audio.resume()}catch(e){}}function drawMusic(now){bg(28);let cx=W*.52,cy=H*.43,rad=Math.min(W,H)*.23;let amp=.3;if(analyser){analyser.getByteFrequencyData(freq);amp=freq.reduce((a,b)=>a+b,0)/freq.length/255}ctx.globalCompositeOperation='lighter';for(let i=0;i<particles.length;i++){let p=particles[i],a=p.a+now/900,r=p.r*(1+amp*.08);ctx.fillStyle=i%5?'rgba(255,220,185,.34)':'rgba(255,154,184,.5)';ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r*.62,2.2+amp*3,0,7);ctx.fill()}ctx.globalCompositeOperation='source-over';ctx.save();ctx.translate(cx,cy);ctx.rotate(now/1600);let gr=ctx.createRadialGradient(0,0,20,0,0,rad);gr.addColorStop(0,'#fff4e8');gr.addColorStop(.18,'#39252d');gr.addColorStop(.5,'#171014');gr.addColorStop(.82,'#d99aaa');gr.addColorStop(1,'#1a1115');ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,0,rad,0,7);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.16)';for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(0,0,rad*(.2+i*.09),0,7);ctx.stroke()}ctx.restore();glow(cx,cy,rad*1.7,'rgba(255,170,195,.11)')}
function pickQuote(){let arr=['今天也要被温柔照顾。','你出现的时候，普通日子会亮一点。','这张卡只负责提醒你：你很值得。','愿今天的风，偏心一点吹向你。'];let d=new Date(),idx=(d.getFullYear()*372+d.getMonth()*31+d.getDate())%arr.length;document.getElementById('quote').textContent=arr[idx]}function drawQuote(now){bg(344);ctx.globalCompositeOperation='lighter';for(let i=0;i<420;i++){let a=i/420*7,r=Math.min(W,H)*(.18+.28*Math.sin(i*13)**2);ctx.fillStyle=i%6?'rgba(255,235,220,.18)':'rgba(232,196,122,.28)';ctx.beginPath();ctx.arc(W*.5+Math.cos(a+now/3000)*r,H*.42+Math.sin(a*1.7+now/2600)*r*.7,1.8,0,7);ctx.fill()}ctx.globalCompositeOperation='source-over'}
function seedFire(){let text='FOR YOU',off=document.createElement('canvas'),ox=off.getContext('2d');off.width=520;off.height=180;ox.fillStyle='white';ox.font='800 72px sans-serif';ox.textAlign='center';ox.fillText(text,260,105);let data=ox.getImageData(0,0,520,180).data;for(let y=0;y<180;y+=6)for(let x=0;x<520;x+=6)if(data[(y*520+x)*4+3]>10)fire.push({x:W/2,y:H*.62,vx:(x-260)*.012,vy:(y-90)*.012-5,tx:W/2+(x-260)*.55,ty:H*.42+(y-90)*.55,life:1,hold:false})}function drawFire(now){bg(228);let age=(now-t0)/1000;ctx.globalCompositeOperation='lighter';if(age<1.2){for(let i=0;i<80;i++){let a=i/80*7,r=age*Math.min(W,H)*.32;ctx.fillStyle='rgba(232,196,122,.75)';ctx.beginPath();ctx.arc(W*.5+Math.cos(a)*r,H*.62+Math.sin(a)*r,2.4,0,7);ctx.fill()}}fire.forEach(p=>{if(age>1){p.x+=(p.tx-p.x)*.055;p.y+=(p.ty-p.y)*.055}else{p.x+=p.vx;p.y+=p.vy;p.vy+=.08}ctx.fillStyle='rgba(255,214,142,.86)';ctx.beginPath();ctx.arc(p.x,p.y,2.4,0,7);ctx.fill()});ctx.globalCompositeOperation='source-over'}
async function seedSprite(){try{let s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});video.srcObject=s;await video.play()}catch(e){}flowers=[{x:W*.55,y:H*.62,b:performance.now()}]}function drawSprite(now){ctx.clearRect(0,0,W,H);if(!video.srcObject)bg(140);let f=flowers[0]||{x:W*.55,y:H*.62,b:now},age=(now-f.b)/1000,bob=Math.sin(now/300)*8;ctx.globalCompositeOperation='lighter';for(let i=0;i<9;i++){let a=i/9*7+now/1600;ctx.fillStyle=i%2?'rgba(255,154,184,.72)':'rgba(232,196,122,.72)';ctx.beginPath();ctx.ellipse(f.x+Math.cos(a)*42,f.y+bob+Math.sin(a)*30,18,30,a,0,7);ctx.fill()}ctx.fillStyle='rgba(255,248,241,.9)';ctx.beginPath();ctx.arc(f.x,f.y+bob,18,0,7);ctx.fill();for(let i=0;i<80;i++){let a=i/80*7,r=(age*80+i)%190;ctx.fillStyle='rgba(255,230,190,.38)';ctx.beginPath();ctx.arc(f.x+Math.cos(a)*r,f.y+bob+Math.sin(a)*r*.6,2,0,7);ctx.fill()}ctx.globalCompositeOperation='source-over'}
document.getElementById('primary').onclick=()=>{if(mode==='music')startMusic();setMode(mode)};document.getElementById('secondary').onclick=()=>{let ks=Object.keys(modes),i=ks.indexOf(mode);setMode(ks[(i+1)%ks.length])};function loop(now){fit();if(mode==='bloom')drawBloom(now);if(mode==='music')drawMusic(now);if(mode==='quote')drawQuote(now);if(mode==='firework')drawFire(now);if(mode==='sprite')drawSprite(now);requestAnimationFrame(loop)}setMode('bloom');requestAnimationFrame(loop);
</script></body></html>
