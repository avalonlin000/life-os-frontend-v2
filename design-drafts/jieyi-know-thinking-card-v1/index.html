<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>结衣知页 · 思考卡 v1</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background: #17130f;
      color: #eadfce;
      -webkit-font-smoothing: antialiased;
      line-height: 1.55;
    }
    button, textarea { font: inherit; }
    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      margin: 0 auto;
      background:
        radial-gradient(circle at 20% -10%, rgba(183, 112, 70, 0.16), transparent 32%),
        linear-gradient(180deg, #1b1611 0%, #15110e 62%, #120f0c 100%);
      position: relative;
      overflow: hidden;
      padding: 22px 18px 92px;
    }
    .app::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .035;
      background-image: linear-gradient(0deg, transparent 24%, rgba(255,255,255,.28) 25%, transparent 26%, transparent 74%, rgba(255,255,255,.18) 75%, transparent 76%);
      background-size: 3px 3px;
    }
    .top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }
    .title {
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-size: 34px;
      font-weight: 500;
      letter-spacing: .04em;
      line-height: 1;
      margin: 0 0 8px;
      color: #f1e6d2;
    }
    .subtitle {
      margin: 0;
      color: #a99782;
      font-size: 13px;
      letter-spacing: .02em;
    }
    .date {
      color: #7e6e5d;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      padding-bottom: 3px;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 20px 0 10px;
      color: #bca98e;
      font-size: 12px;
      letter-spacing: .16em;
    }
    .section-head span:first-child { text-transform: uppercase; }
    .section-head .count {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .02em;
      color: #7d6d5b;
    }
    .thinking-card {
      border: 1px solid rgba(226, 199, 160, .12);
      background: rgba(35, 29, 23, .78);
      border-radius: 22px;
      padding: 20px 18px 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.035);
    }
    .source-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #8e7d68;
      font-size: 11px;
      margin-bottom: 16px;
    }
    .pill {
      border: 1px solid rgba(207, 153, 99, .24);
      color: #d1a06b;
      border-radius: 999px;
      padding: 3px 8px;
      white-space: nowrap;
    }
    .statement {
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      color: #f2e7d3;
      font-size: 25px;
      line-height: 1.28;
      margin: 0 0 18px;
      letter-spacing: .01em;
    }
    .block {
      padding: 14px 0;
      border-top: 1px solid rgba(226,199,160,.09);
    }
    .block-label {
      color: #c88957;
      font-size: 12px;
      letter-spacing: .12em;
      margin-bottom: 6px;
    }
    .block p {
      margin: 0;
      color: #d5c6b2;
      font-size: 14px;
    }
    .question p {
      color: #f0dbc2;
      font-size: 17px;
      line-height: 1.45;
    }
    .answer {
      width: 100%;
      resize: none;
      min-height: 94px;
      border: 1px solid rgba(226,199,160,.13);
      background: rgba(19, 15, 12, .72);
      color: #eadfce;
      border-radius: 16px;
      padding: 13px 14px;
      outline: none;
      margin-top: 10px;
    }
    .answer:focus {
      border-color: rgba(200, 137, 87, .62);
      box-shadow: 0 0 0 3px rgba(200,137,87,.08);
    }
    .answer::placeholder { color: #746657; }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 42px;
      gap: 9px;
      margin-top: 14px;
    }
    .btn {
      border: 1px solid rgba(226,199,160,.14);
      background: rgba(232, 220, 199, .075);
      color: #e7d8c1;
      border-radius: 13px;
      min-height: 40px;
      padding: 0 12px;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }
    .btn:active { transform: translateY(1px) scale(.99); }
    .btn.primary {
      background: #bd7448;
      color: #fff5e8;
      border-color: #bd7448;
    }
    .btn:hover { border-color: rgba(226,199,160,.28); background: rgba(232,220,199,.105); }
    .btn.primary:hover { background: #c67d50; }
    .queue {
      display: grid;
      gap: 9px;
      margin-top: 8px;
    }
    .queue-row {
      border-top: 1px solid rgba(226,199,160,.08);
      padding: 13px 2px 10px;
      display: grid;
      grid-template-columns: 52px 1fr auto;
      align-items: baseline;
      gap: 10px;
    }
    .queue-type {
      color: #8c7a65;
      font-size: 12px;
      letter-spacing: .1em;
    }
    .queue-main {
      color: #d9c9b6;
      font-size: 14px;
    }
    .queue-meta {
      color: #766757;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
    }
    .quiet-link {
      width: 100%;
      border: 0;
      background: transparent;
      color: #857463;
      padding: 15px 0 0;
      text-align: left;
      font-size: 13px;
    }
    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(394px, calc(100vw - 32px));
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 6px;
      border: 1px solid rgba(226,199,160,.12);
      background: rgba(22, 18, 14, .86);
      backdrop-filter: blur(18px);
      border-radius: 22px;
      box-shadow: 0 16px 38px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.035);
    }
    .nav-item {
      min-height: 46px;
      border: 0;
      border-radius: 16px;
      background: transparent;
      color: #7f6f5d;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-size: 20px;
      cursor: pointer;
    }
    .nav-item.active {
      color: #f2e6d3;
      background: rgba(199, 132, 78, .18);
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 82px;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      background: #eadfce;
      color: #201914;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      transition: all .22s ease;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 360px) {
      .app { padding-inline: 14px; }
      .statement { font-size: 23px; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div>
        <h1 class="title">知</h1>
        <p class="subtitle">用一条知识，逼自己想清一件事。</p>
      </div>
      <div class="date">06.28</div>
    </header>

    <div class="section-head"><span>当前</span><span class="count">1 / 3</span></div>

    <article class="thinking-card">
      <div class="source-row">
        <span>来源：结衣整理 · 当前讨论</span>
        <span class="pill">新知</span>
      </div>

      <h2 class="statement">轻量不是少功能，是少干扰。</h2>

      <section class="block question">
        <div class="block-label">结衣问</div>
        <p>你现在想砍掉的是功能，还是会让你分心的入口？</p>
      </section>

      <section class="block">
        <div class="block-label">结合你</div>
        <p>你刚刚在拆结衣和小雪，容易把“边界清楚”做成“页面更多”。真正需要控制的是默认展开的信息和入口数量。</p>
      </section>

      <section class="block">
        <div class="block-label">建议</div>
        <p>知页保留新知、复习、提问、建议和你的判断；导入交给对话和后台，不占首屏。</p>
      </section>

      <section class="block">
        <div class="block-label">你的判断</div>
        <textarea class="answer" placeholder="我觉得真正要砍的是……"></textarea>
      </section>

      <div class="actions">
        <button class="btn primary" data-toast="已转成行动候选">转行动</button>
        <button class="btn" data-toast="已沉淀到知">沉淀</button>
        <button class="btn" data-toast="下一条">›</button>
      </div>
    </article>

    <div class="section-head"><span>复习</span><span class="count">3 张</span></div>
    <section class="queue">
      <div class="queue-row">
        <div class="queue-type">旧知</div>
        <div class="queue-main">少导入，多转化</div>
        <div class="queue-meta">2d</div>
      </div>
      <div class="queue-row">
        <div class="queue-type">原则</div>
        <div class="queue-main">边界先于功能</div>
        <div class="queue-meta">5d</div>
      </div>
      <div class="queue-row">
        <div class="queue-type">反例</div>
        <div class="queue-main">不要把轻量做成空白</div>
        <div class="queue-meta">9d</div>
      </div>
    </section>

    <button class="quiet-link" data-toast="导入交给和结衣对话，前端只保留弱入口">粘贴材料</button>
  </main>

  <nav class="bottom-nav" aria-label="结衣导航">
    <button class="nav-item active">知</button>
    <button class="nav-item">行</button>
    <button class="nav-item">思</button>
    <button class="nav-item">道</button>
  </nav>
  <div class="toast" id="toast"></div>

  <script>
    const toast = document.getElementById('toast');
    let timer;
    document.querySelectorAll('[data-toast]').forEach((el) => {
      el.addEventListener('click', () => {
        toast.textContent = el.dataset.toast;
        toast.classList.add('show');
        clearTimeout(timer);
        timer = setTimeout(() => toast.classList.remove('show'), 1400);
      });
    });
  </script>
</body>
</html>
